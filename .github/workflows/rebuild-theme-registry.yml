name: Rebuild theme registry

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsx tools/build-theme-registry.ts
      - name: Commit on change
        run: |
          if git diff --quiet docs/site/themes/_registry.json; then
            echo "No registry changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/site/themes/_registry.json
          git commit -m "chore: rebuild theme registry"
          git push origin HEAD:main
