[project]
name = "excalidraw-skill-pack-render"
version = "0.1.0"
description = "Render Excalidraw JSON to PNG. Python binding for excalidraw-skill-pack."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Timur Isachenko" }]
keywords = ["excalidraw", "render", "png", "diagrams", "ai-agent", "visualization", "playwright", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "playwright>=1.40.0"
]

[project.urls]
Homepage = "https://excalidraw-skill-pack.vercel.app"
Repository = "https://github.com/isatimur/excalidraw-skill-pack"
Documentation = "https://excalidraw-skill-pack.vercel.app"
"Bug Tracker" = "https://github.com/isatimur/excalidraw-skill-pack/issues"

[project.scripts]
excalidraw-render = "excalidraw_render.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/excalidraw_render"]

[tool.hatch.build.targets.wheel.force-include]
"src/excalidraw_render/render_template.html" = "excalidraw_render/render_template.html"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pillow>=10.0.0",
    "pixelmatch>=0.3.0"
]
