[project]
name = "excalidraw-skill-pack-theme-whiteboard"
version = "0.1.0"
description = "Low-fi, bright, intentionally sketchy. For workshops and ideation sessions."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Timur Isachenko" }]
keywords = ["excalidraw", "excalidraw-skill-pack", "theme", "ai-agent", "diagrams"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/excalidraw_skill_pack_theme_whiteboard"]

[tool.hatch.build.targets.wheel.force-include]
"theme.json" = "excalidraw_skill_pack_theme_whiteboard/theme.json"
"palette.json" = "excalidraw_skill_pack_theme_whiteboard/palette.json"
"palette.md" = "excalidraw_skill_pack_theme_whiteboard/palette.md"
"typography.json" = "excalidraw_skill_pack_theme_whiteboard/typography.json"
"elements" = "excalidraw_skill_pack_theme_whiteboard/elements"
"layouts" = "excalidraw_skill_pack_theme_whiteboard/layouts"
