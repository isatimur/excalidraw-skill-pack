[project]
name = "excalidraw-skill-pack-theme-notion"
version = "0.1.0"
description = "Rounded, soft, off-white. Matches Notion&#39;s docs aesthetic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Timur Isachenko" }]
keywords = ["excalidraw", "excalidraw-skill-pack", "theme", "ai-agent", "diagrams", "visualization", "branding", "notion"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Graphics",
]

[project.urls]
Homepage = "https://excalidraw-skill-pack.vercel.app/themes"
Repository = "https://github.com/isatimur/excalidraw-skill-pack"
Documentation = "https://excalidraw-skill-pack.vercel.app"
"Bug Tracker" = "https://github.com/isatimur/excalidraw-skill-pack/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/excalidraw_skill_pack_theme_notion"]

[tool.hatch.build.targets.wheel.force-include]
"theme.json" = "excalidraw_skill_pack_theme_notion/theme.json"
"palette.json" = "excalidraw_skill_pack_theme_notion/palette.json"
"palette.md" = "excalidraw_skill_pack_theme_notion/palette.md"
"typography.json" = "excalidraw_skill_pack_theme_notion/typography.json"
"elements" = "excalidraw_skill_pack_theme_notion/elements"
"layouts" = "excalidraw_skill_pack_theme_notion/layouts"
