<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { exportToSvg, convertToExcalidrawElements } from "https://esm.sh/@excalidraw/excalidraw@0.18.0";

    // Resolve any supported input document to fully-qualified Excalidraw elements:
    //   type: "mermaid"             → parse Mermaid → skeleton → full elements
    //   type: "excalidraw-skeleton" → hydrate skeleton → full elements
    //   (default / "excalidraw")    → use elements as-is
    // Mermaid is a heavy dependency, so it is imported dynamically only when needed.
    async function resolveToFull(data) {
      if (data.type === "mermaid") {
        const { parseMermaidToExcalidraw } = await import("https://esm.sh/@excalidraw/mermaid-to-excalidraw@1.1.3");
        const def = data.definition || data.mermaid || "";
        const { elements, files } = await parseMermaidToExcalidraw(def, data.mermaidConfig || {});
        return { elements: convertToExcalidrawElements(elements), files: files || {} };
      }
      if (data.type === "excalidraw-skeleton") {
        return { elements: convertToExcalidrawElements(data.elements || []), files: data.files || {} };
      }
      return { elements: data.elements || [], files: data.files || {} };
    }

    window.renderDiagram = async function(jsonData) {
      try {
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const { elements, files } = await resolveToFull(data);
        const appState = data.appState || {};

        // Force white background in appState
        appState.viewBackgroundColor = appState.viewBackgroundColor || "#ffffff";
        appState.exportWithDarkMode = false;

        const svg = await exportToSvg({
          elements: elements,
          appState: {
            ...appState,
            exportBackground: true,
          },
          files: files,
        });

        // Clear any previous render
        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = err.message;
        return { success: false, error: err.message };
      }
    };

    // Hydrate a skeleton or Mermaid document into a full, Excalidraw-openable
    // .excalidraw document (full elements with generated id/seed/versionNonce).
    window.hydrateSkeleton = async function(jsonData) {
      const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
      const { elements, files } = await resolveToFull(data);
      return JSON.stringify({
        type: "excalidraw",
        version: 2,
        source: "https://github.com/isatimur/excalidraw-skill-pack",
        elements: elements,
        appState: data.appState || { viewBackgroundColor: "#ffffff", gridSize: 20 },
        files: files,
      });
    };

    // Signal that the module is loaded and ready
    window.__moduleReady = true;
  </script>
</body>
</html>
